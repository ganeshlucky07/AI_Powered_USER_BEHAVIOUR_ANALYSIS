services:
  - type: web
    name: risk-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/risk-score-engine-1.0.0.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /api/health
    autoDeploy: true
