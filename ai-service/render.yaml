services:
  - type: web
    name: risk-ai-service
    env: python
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    autoDeploy: true
